# Terraform Provider release workflow.
name: Release

# This GitHub action creates a release when a tag that matches the pattern
# "v*" (e.g. v0.1.0) is created.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Releases need permissions to read and write the repository contents.
# GitHub considers creating releases and uploading assets as writing contents.
permissions:
  contents: write

jobs:
  verify:
    name: Verify Release Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - run: go mod download
      - run: go build -v .
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - run: go test ./... -coverpkg=./... -coverprofile=coverage.out
      - run: go tool cover -func=coverage.out
      - run: go vet ./...
      - run: staticcheck ./...
      - run: gosec ./...
      - run: govulncheck ./...

  acceptance:
    name: Verify Release Acceptance Tests
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      LDAP_URL: ldaps://localhost:1636
      LDAP_BIND_DN: cn=admin,dc=example,dc=com
      LDAP_BIND_PASSWORD: admin
      LDAP_TLS_INSECURE_VERIFY: "true"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: '1.14.*'
          terraform_wrapper: false
      - run: docker compose -f ./contrib/test-ldap-server/docker-compose.yaml up -d
      - run: go mod download
      - env:
          TF_ACC: "1"
        run: go test -v -cover ./internal/provider/
        timeout-minutes: 10
      - if: always()
        run: docker compose -f ./contrib/test-ldap-server/docker-compose.yaml down -v

  goreleaser:
    name: Publish Release
    needs:
      - verify
      - acceptance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Allow goreleaser to access older tag information.
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          # GitHub sets the GITHUB_TOKEN secret automatically.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
